version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: amortizaciones_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: amortizaciones_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d amortizaciones_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: amortizaciones_postgres_data
